<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI News Radar | 研究终端</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <div class="terminal">
      <header class="statusbar">
        <div class="brand"><span class="logo">◆</span> AI NEWS RADAR <span class="env">LOCAL</span></div>
        <div class="status-items">
          <div class="stat posture">
            <span class="stat-k">POSTURE 宏观</span>
            <span class="stat-v posture-na" id="postureVal">—</span>
          </div>
          <div class="stat urgent" id="urgentStat">
            <span class="stat-k">URGENT 立即研究</span>
            <span class="stat-v" id="urgentVal">0</span>
          </div>
          <div class="stat">
            <span class="stat-k">CANDIDATES 候选</span>
            <span class="stat-v" id="candVal">0</span>
          </div>
          <div class="stat">
            <span class="stat-k">ARTICLES 文章</span>
            <span class="stat-v" id="artVal">0</span>
          </div>
          <div class="stat">
            <span class="stat-k">NEXT SCAN 下次</span>
            <span class="stat-v" id="nextRun" style="font-size:11px">—</span>
          </div>
          <div class="live" id="liveDot"><span class="dot"></span><span id="liveText">LIVE</span></div>
        </div>
      </header>

      <nav class="tabbar" aria-label="Views">
        <button class="tab active" data-view="brief" type="button">简报 Brief</button>
        <button class="tab" data-view="opportunities" type="button">机会 Ideas <span class="tab-badge" id="oppBadge"></span></button>
        <button class="tab" data-view="watchlist" type="button">观察池</button>
        <button class="tab" data-view="earnings" type="button">财报</button>
        <button class="tab" data-view="technology" type="button">技术</button>
        <button class="tab" data-view="market" type="button">宏观</button>
        <button class="tab" data-view="process" type="button">过程</button>
        <button class="tab" data-view="sources" type="button">来源</button>
      </nav>

      <div class="toolbar">
        <h2 id="viewTitle">每日简报</h2>
        <p id="statusLine" role="status">待命</p>
        <input id="searchBox" type="search" placeholder="筛选 ticker / 公司 / 来源 / 关键词" aria-label="Filter current view">
      </div>

      <div id="scanProgress" class="progress" hidden>
        <div class="progress-bar"></div>
        <span id="progressText">自动分析运行中</span>
      </div>

      <div id="errorBox" class="errors" hidden></div>

      <main id="contentArea" aria-live="polite"></main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
